<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>RS Player Pro - Smooth</title>

    <script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>
    <script>
        jwplayer.key="Khpp2dHxlBJHC8MCmLnBuV2jK/DwDnJMniwF6EO9HC/riJ712ZmbHg==";
    </script>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; background:#000; overflow:hidden; position: fixed; }
        
        #player-wrapper { position: relative; width: 100%; height: 100%; }
        #player { width:100% !important; height:100% !important; position: absolute; top:0; left:0; }

        /* --- ভিডিও স্ক্রিন চারকোনা কাটা ফিক্স (টিভি ও মোবাইলের জন্য ফুল ফিট) --- */
        .jw-video.jw-reset { 
            object-fit: fill !important; 
        }
        
        /* এরর মেসেজ স্টাইল */
        .error-message {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #ff4d4d; font-family: 'Segoe UI', sans-serif;
            font-size: 18px; font-weight: bold; text-align: center;
            z-index: 99; text-transform: uppercase; letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div id="player-wrapper">
    <div id="player"></div>
</div>

<script>
    // URL থেকে 'url' প্যারামিটার নেওয়া হচ্ছে
    const urlParams = new URLSearchParams(window.location.search);
    const streamSource = urlParams.get('url');

    if (streamSource) {
        const player = jwplayer("player").setup({
            playlist: [{ file: streamSource, type: "hls" }],
            width: "100%",
            height: "100%",
            autostart: true,
            stretching: "exactfit", // স্ক্রিন সম্পূর্ণ ফিট করার জন্য
            displaytitle: false,
            controls: true
        });

        // প্লেয়ার রেডি হওয়া মাত্র ফুল সাউন্ড এবং স্মুথ প্লে স্টার্ট করার লজিক
        player.on("ready", () => {
            player.setMute(false);
            player.setVolume(100);
        });

        // যদি কোনো কারণে স্ট্রিম বা চ্যানেল অফলাইন থাকে
        player.on("error", () => {
            const wrapper = document.getElementById("player-wrapper");
            wrapper.innerHTML = `<div class="error-message">Stream Offline or Invalid URL</div>`;
        });

    } else {
        document.getElementById("player-wrapper").innerHTML = `<div class="error-message">No Stream URL Found</div>`;
    }
</script>

</body>
</html>
