<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>RS Player Pro</title>

<!-- JW Player -->
<script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>
<script>
  jwplayer.key = "YOUR_JWPLAYER_KEY";
</script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:sans-serif;}

#player-wrapper{position:relative;width:100%;height:100%;}
#player{width:100%;height:100%;}

/* Video Fit */
.jw-video{
  width:100%!important;
  height:100%!important;
  object-fit:fill!important;
}

/* Loader */
#loader{
  position:absolute;
  inset:0;
  background:#000;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:99;
  transition:0.3s;
}

.loader-box{
  width:90px;height:90px;
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
}

.ring{
  position:absolute;
  width:100%;height:100%;
  border-radius:50%;
  border:2px solid transparent;
  animation:spin 1.5s linear infinite;
}

.ring:nth-child(1){
  border-top:2px solid #00c3ff;
  border-right:2px solid #00c3ff;
}

.ring:nth-child(2){
  border-bottom:2px solid #ff007f;
  border-left:2px solid #ff007f;
  animation-direction:reverse;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}

.brand{
  text-align:center;
  z-index:2;
  color:#fff;
  font-size:10px;
  margin-top:12px;
}

.brand span{color:#00c3ff;}

.loading{
  margin-top:12px;
  font-size:11px;
  color:#aaa;
  letter-spacing:2px;
}

.hide{opacity:0;visibility:hidden;}

.error{
  color:#fff;
  text-align:center;
}

.error i{
  font-size:40px;
  color:red;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div id="player-wrapper">

  <!-- Loader -->
  <div id="loader">
    <div class="loader-box">
      <div class="ring"></div>
      <div class="ring"></div>
      <div style="text-align:center;z-index:2;">
        <i class="fas fa-tv" style="color:#00c3ff;font-size:22px;"></i>
        <div class="brand">RS LIVE <span>TV</span></div>
      </div>
    </div>
    <div class="loading">BUFFERING...</div>
  </div>

  <div id="player"></div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const stream = urlParams.get("url");

const loader = document.getElementById("loader");

if(stream){

  const player = jwplayer("player").setup({
    playlist: [{
      file: stream,
      type: "hls"
    }],
    width: "100%",
    height: "100%",
    autostart: true,
    stretching: "fill",
    displaytitle: false
  });

  player.on("ready", () => {
    player.setVolume(100);
    player.setMute(false);
  });

  player.on("play", () => {
    loader.classList.add("hide");
  });

  player.on("buffer", () => {
    loader.classList.remove("hide");
  });

  player.on("error", () => {
    loader.innerHTML = `
      <div class="error">
        <i class="fas fa-exclamation-triangle"></i>
        <div>Stream Offline</div>
      </div>
    `;
  });

} else {
  loader.innerHTML = "<div style='color:white'>No Stream URL Found</div>";
}
</script>

</body>
</html>
