<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS Player - Premium IPTV</title>
    
    <script src="https://cdn.jwplayer.com/libraries/IDzF9ZBy.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; 
            height: 100%; 
            background-color: #000; 
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #jw-video-player {
            width: 100% !important;
            height: 100vh !important;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }

        /* Error Message Styling */
        #error-msg {
            color: #00f2ff;
            font-family: sans-serif;
            text-align: center;
            display: none;
            padding: 20px;
            border: 1px solid #00f2ff;
            border-radius: 10px;
            background: rgba(0, 242, 255, 0.05);
        }
    </style>
</head>
<body>

    <div id="error-msg">
        <h2>Invalid Stream URL</h2>
        <p>Please provide a valid .m3u8 link in the URL parameter.</p>
    </div>
    <div id="jw-video-player"></div>

<script>
    // ১. ইউআরএল থেকে 'url' প্যারামিটার নেওয়ার ফাংশন
    function getQueryParam(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
    }

    // ২. কনফিগারেশন
    const rawUrl = getQueryParam('url');
    // আপনার ক্লাউডফ্লেয়ার ওয়ার্কার ইউআরএল নিচে দিন (যদি প্রক্সি প্রয়োজন হয়)
    const proxyPrefix = "https://your-worker.workers.dev/?url="; 

    if (rawUrl) {
        // যদি লিঙ্কটি aynascope এর হয়, তবে অটোমেটিক প্রক্সি ব্যবহার করবে
        let finalUrl = rawUrl;
        if (rawUrl.includes("aynascope") || rawUrl.includes("ts")) {
            finalUrl = proxyPrefix + encodeURIComponent(rawUrl);
        }

        // ৩. JW Player সেটআপ
        const playerInstance = jwplayer("jw-video-player").setup({
            file: finalUrl,
            type: "hls",
            width: "100%",
            height: "100%",
            autostart: true,
            mute: false,
            stretching: "uniform",
            primary: "html5",
            hlsjsconfig: {
                xhrSetup: function(xhr) {
                    xhr.withCredentials = false;
                }
            }
        });

        // ৪. ফুলস্ক্রিন ও অটো-রোটেশন লজিক (আপনার আগের রিকোয়েস্ট অনুযায়ী)
        playerInstance.on('fullscreen', function(event) {
            if (event.fullscreen && screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(() => {});
            }
        });

        // ৫. এরর হ্যান্ডলিং
        playerInstance.on('error', function(e) {
            console.error("Player Error:", e.message);
            // যদি প্রক্সি ছাড়া না চলে, তবে প্রক্সি দিয়ে পুনরায় চেষ্টা করার লজিক এখানে যোগ করা যায়
        });

    } else {
        document.getElementById('error-msg').style.display = 'block';
    }
</script>

</body>
</html>
