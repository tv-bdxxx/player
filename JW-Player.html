<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
    <title>RS Live TV Player</title>

    <!-- JW Player Library -->
    <script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>
    <script>
        jwplayer.key = "Khpp2dHxlBJHC8MCmLnBuV2jK/DwDnJMniwF6EO9HC/riJ712ZmbHg==";
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #player {
            width: 100% !important;
            height: 100% !important;
            position: absolute;
            top: 0;
            left: 0;
        }
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: #3b82f6;
            animation: spin 0.8s linear infinite;
        }
        #loader-text {
            margin-top: 15px;
            color: #94a3b8;
            font-size: 13px;
            letter-spacing: 0.5px;
            text-align: center;
            max-width: 80%;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        /* মোবাইলে ভিডিও ফুল স্ক্রিনে স্ট্রেচ */
        .jw-video {
            object-fit: fill !important;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div id="loader-text">Loading Stream...</div>
    </div>

    <div id="player"></div>

    <script>
        // ============================================================
        // URL প্যারামিটার থেকে স্ট্রিম লিংক নেওয়া
        // ============================================================
        const urlParams = new URLSearchParams(window.location.search);
        const streamUrl = urlParams.get('url');

        if (!streamUrl) {
            document.getElementById("loader-text").innerHTML = 
                "<span style='color:#ff4444;'>❌ No Stream URL Found</span>";
            // প্লেয়ার সেটআপ না করেই থামানো ভালো
            throw new Error("Missing 'url' parameter");
        }

        // ============================================================
        // JW Player – অপটিমাইজড কনফিগারেশন
        // ============================================================
        const player = jwplayer("player").setup({
            file: streamUrl,
            width: "100%",
            height: "100%",
            aspectratio: "16:9",
            stretching: "fill",
            preload: "auto",
            autostart: false,          // ⭐ প্রস্তুত হলে আমরা নিজেরা start করব
            mute: false,
            controls: true,
            playbackRateControls: false,
            // ⭐ বাফার সাইজ বাড়ানো
            bufferlength: 10,
            // ⭐ HLS-নির্দিষ্ট অপশন
            hls: {
                // কম লেটেন্সি মোড
                lowLatencyMode: true,
                // সর্বোচ্চ বাফার দৈর্ঘ্য (সেকেন্ড)
                maxBufferLength: 30,
                // নেটওয়ার্ক রিডান্ডেন্সি
                forceNAT: true,
                // আবার চেষ্টার সংখ্যা
                retryLimit: 3
            }
        });

        // ============================================================
        // লোডার কন্ট্রোল
        // ============================================================
        function showLoader(text) {
            const loader = document.getElementById("loader");
            loader.style.display = "flex";
            loader.style.opacity = "1";
            document.getElementById("loader-text").innerHTML = text;
        }

        function hideLoader() {
            const loader = document.getElementById("loader");
            loader.style.opacity = "0";
            setTimeout(() => { 
                loader.style.display = "none"; 
            }, 300);
        }

        // ============================================================
        // প্লেয়ার ইভেন্ট – স্মার্ট অটোপ্লে
        // ============================================================
        let isPlaying = false;

        // স্ট্রিম প্রস্তুত হলে অটোপ্লে
        player.on("ready", function() {
            console.log("📺 Player ready, attempting to play...");
            // থামা না থাকলে প্লে করুন
            if (!isPlaying) {
                player.play();
            }
            hideLoader();
        });

        // প্লে শুরু হলে লোডার লুকান
        player.on("play", function() {
            isPlaying = true;
            hideLoader();
        });

        // বাফার শুরু হলে লোডার দেখান (শুধু যদি 2 সেকেন্ডের বেশি লাগে)
        let bufferTimeout;
        player.on("buffer", function() {
            clearTimeout(bufferTimeout);
            bufferTimeout = setTimeout(() => {
                if (!isPlaying) {
                    showLoader("⏳ Buffering...");
                }
            }, 2000);
        });

        // বাফার শেষ হলে লোডার লুকান
        player.on("bufferChange", function(event) {
            if (event.bufferPercent > 30) {
                clearTimeout(bufferTimeout);
                hideLoader();
            }
        });

        // প্রথম পজ/প্লে টগল – ইউজার পজ করলে লোডার দেখাব না
        player.on("pause", function() {
            clearTimeout(bufferTimeout);
            hideLoader();
        });

        // ============================================================
        // এরর হ্যান্ডলিং
        // ============================================================
        player.on("error", function(e) {
            console.error("❌ Player Error:", e);
            showLoader(
                `<span style='color:#ff6b6b;'>⚠️ Stream Error</span><br>
                <small style='color:#94a3b8;'>${e.message || 'Could not load stream'}</small>`
            );
            // পুনরায় চেষ্টা করতে চাইলে:
            // setTimeout(() => { player.load({ file: streamUrl }); }, 5000);
        });

        // ============================================================
        // ফুলস্ক্রিন ও ওরিয়েন্টেশন
        // ============================================================
        player.on("fullscreen", function(event) {
            if (event.fullscreen && screen.orientation && screen.orientation.lock) {
                screen.orientation.lock("landscape").catch(function(err) {
                    console.log("Orientation lock ignored:", err);
                });
            }
            // ভিডিও স্ট্রেচিং ঠিক করতে
            setTimeout(() => {
                const videoEl = document.querySelector('.jw-video');
                if (videoEl) {
                    videoEl.style.setProperty('object-fit', 'fill', 'important');
                }
            }, 100);
        });

        // ============================================================
        // স্টার্ট – যদি ৫ সেকেন্ডের মধ্যে রেডি না হয়, তবু লোডার দেখান
        // ============================================================
        setTimeout(() => {
            const loader = document.getElementById("loader");
            if (loader.style.display !== "none") {
                showLoader("⏳ Still loading...");
            }
        }, 5000);

        // ============================================================
        // ডিবাগ লগ (প্রোডাকশনে কমেন্ট করুন)
        // ============================================================
        console.log("🚀 RS Live Player optimized with bufferlength=10, lowLatencyMode=true");
    </script>
</body>
</html>
