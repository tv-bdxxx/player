<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JW Player - Live Stream</title>
    
    <script src="https://cdn.jwplayer.com/libraries/IDx7m9qq.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        #player-container {
            width: 80%;
            max-width: 800px;
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.5);
        }
        @media (max-width: 768px) {
            #player-container {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div id="player-container">
        <div id="live-player"></div>
    </div>

    <script>
        // আপনার দেওয়া মূল m3u8 লিঙ্ক এবং টোকেন
        const streamUrl = "https://edge2.roarzone.net:8447/roarzone/edge2/tsports/index.m3u8?token=796d16502dc23cff0e81c744977f097899883a11-26e2819779c52dfcd7b50f1e3c534467-1780689199-1780678399";

        // JW Player সেটআপ
        jwplayer("live-player").setup({
            file: streamUrl,
            width: "100%",
            aspectratio: "16:9",
            autostart: true,
            controls: true,
            type: "m3u8", // স্ট্রিম টাইপ নির্দিষ্ট করে দেওয়া হলো
            sharing: false,
            cast: {}, // Chromecast সাপোর্ট
            playbackRateControls: false
        });
    </script>

</body>
</html>
