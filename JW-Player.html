<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shak Player</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@clappr/player@latest/dist/clappr.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        #shak-player {
            width: 100% !important;
            height: 100% !important;
        }
        .error-msg {
            color: #ff4d4d;
            text-align: center;
            font-size: 18px;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div id="shak-player"></div>

    <script>
        // URL থেকে ভিডিও লিংক নেওয়ার ফাংশন
        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        const videoUrl = getQueryParam('url');

        if (videoUrl) {
            // নতুন শক্তিশালী প্লেয়ার সেটআপ
            var player = new Clappr.Player({
                source: videoUrl,
                parentId: "#shak-player",
                width: "100%",
                height: "100%",
                autoPlay: true,
                mute: false,
                mediacontrol: { seekbar: "#ff0000", buttons: "#ffffff" }, // Shak Red Theme
                playback: {
                    playInline: true,
                    crossOrigin: 'anonymous'
                }
            });
        } else {
            document.getElementById('shak-player').innerHTML = `
                <div class="error-msg">
                    <h3>কোনো ভিডিও লিংক পাওয়া যায়নি!</h3>
                    <p>দয়া করে লিংক এভাবে ব্যবহার করুন: ?url=YOUR_VIDEO_URL</p>
                </div>
            `;
        }
    </script>

</body>
</html>
