<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>RS Player Pro - Compact Loader</title>

    <script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>
    <script>
        jwplayer.key="Khpp2dHxlBJHC8MCmLnBuV2jK/DwDnJMniwF6EO9HC/riJ712ZmbHg==";
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family: 'Segoe UI', sans-serif; position: fixed; }
        
        #player-wrapper { position: relative; width: 100%; height: 100%; overflow: hidden; }
        #player { width:100% !important; height:100% !important; position: absolute; top:0; left:0; }

        /* --- কন্ট্রোলার কাস্টমাইজেশন --- */
        .jw-skin-glow .jw-display-icon-container { 
            background: rgba(255, 255, 255, 0.1) !important; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            backdrop-filter: none !important; 
        }
        .jw-skin-glow .jw-button-color { color: #ffffff !important; }
        .jw-skin-glow .jw-controlbar { 
            background: transparent !important; 
            backdrop-filter: none !important; 
        }

        /* --- লোডার ডিজাইন --- */
        #loader {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: #000; display:flex; justify-content:center; align-items:center;
            z-index:99; flex-direction: column; transition: opacity 0.4s ease;
        }

        .loader-container {
            position: relative; 
            width: 100px; 
            height: 100px; 
            display: flex; justify-content: center; align-items: center;
        }

        .loader-brand { text-align: center; z-index: 10; }
        .tv-icon { font-size: 24px; color: #00c3ff; text-shadow: 0 0 10px #00c3ff; } 
        .brand-name { font-size: 10px; font-weight: 700; color: #fff; text-transform: uppercase; margin-top: 5px; letter-spacing: 1px; }
        .brand-name span { color: #00c3ff; }

        .neon-ring {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%; border: 2px solid transparent;
            animation: rotate-vortex 1.5s linear infinite;
        }
        .neon-ring:nth-child(1) { border-top: 2px solid #00c3ff; border-right: 2px solid #00c3ff; box-shadow: 0 0 10px #00c3ff; }
        .neon-ring:nth-child(2) { border-bottom: 2px solid #ff007f; border-left: 2px solid #ff007f; animation-direction: reverse; animation-duration: 2s; box-shadow: 0 0 10px #ff007f; }

        @keyframes rotate-vortex { 100% { transform: rotate(360deg); } }

        .loading-text { color: rgba(255, 255, 255, 0.6); font-size: 10px; margin-top: 15px; letter-spacing: 2px; text-transform: uppercase; }

        /* --- ভিডিও সাইড কাটা ফিক্স --- */
        .jw-video.jw-reset { 
            object-fit: fill !important; 
        }
        
        .hide-now { opacity: 0 !important; visibility: hidden !important; }

        /* এরর মেসেজ */
        .error-content { text-align: center; color: #fff; z-index: 100; }
        .error-content i { font-size: 40px; color: #ff4d4d; margin-bottom: 15px; }

        /* ================= নতুন রিমোট আইকন ও প্যানেল ডিজাইন ================= */
        
        /* শুধু আইকন বাটন (প্লেয়ারের ভেতরে নিচে ছোট করে) */
        #remote-toggle-icon {
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            width: 42px; height: 42px; background: rgba(0, 0, 0, 0.75); 
            border: 1px solid rgba(0, 195, 255, 0.4); border-radius: 50%;
            display: none; justify-content: center; align-items: center;
            color: #00c3ff; font-size: 18px; cursor: pointer; z-index: 150;
            box-shadow: 0 0 10px rgba(0, 195, 255, 0.3); transition: all 0.3s ease;
        }
        #remote-toggle-icon:hover { background: #00c3ff; color: #000; box-shadow: 0 0 15px #00c3ff; }

        /* পিসি এবং স্মার্ট টিভির জন্য আইকন সবসময় শো থাকবে */
        @media (min-width: 1024px) {
            #remote-toggle-icon { display: flex !important; }
        }
        
        /* মোবাইল যখন রোটেড/ল্যান্ডস্কেপ (Landscape) হবে তখন শো করার জন্য ক্লাস */
        @media (max-width: 1023px) and (orientation: landscape) {
            .mobile-landscape-show { display: flex !important; }
        }

        /* রিমোট কন্ট্রোল বডি প্যানেল (ইমেজ "1000031334_2.jpg" এর মতো ম্যাট ব্ল্যাক ডিজাইন) */
        #tv-remote-panel {
            position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
            width: 220px; background: #141416; border: 2px solid #232327; border-radius: 24px;
            padding: 15px; z-index: 200; display: none; flex-direction: column; gap: 10px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }
        #tv-remote-panel.open { display: flex !important; }

        .remote-brand { text-align: center; font-size: 9px; color: #555861; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
        .remote-row { display: flex; justify-content: space-between; gap: 8px; }
        
        .pwr-btn { width: 45px; height: 35px; background: rgba(255, 51, 51, 0.1); color: #ff3333; border-radius: 8px; border: 1px solid rgba(255,51,51,0.2); font-size: 14px; cursor: pointer; }
        .pwr-btn:active { background: #ff3333; color: #fff; }
        .cls-btn { width: 45px; height: 35px; background: #202024; color: #888; border-radius: 8px; border: none; font-size: 14px; cursor: pointer; }

        .num-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .r-btn {
            height: 36px; background: #202024; color: #e2e2e5; border: 1px solid #2a2a30;
            border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
        }
        .r-btn:active { background: #00c3ff; color: #000; border-color: #00c3ff; }

        .ch-container { display: flex; flex-direction: column; gap: 5px; align-items: center; width: 100%; }
        .ch-btn {
            width: 100%; height: 34px; background: #202024; color: #aaa; border: 1px solid #2a2a30;
            border-radius: 8px; font-size: 10px; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .ch-btn:active { background: #ff007f; color: #fff; }
        .ok-btn { width: 46px; height: 46px; background: #1a1a1d; color: #fff; border: 2px solid #2a2a30; border-radius: 50%; font-size: 11px; font-weight: bold; cursor: pointer; }
        .ok-btn:active { background: #fff; color: #000; }
    </style>
</head>
<body>

<div id="player-wrapper">
    <!-- আপনার অরিজিনাল লোডার -->
    <div id="loader">
        <div class="loader-container">
            <div class="neon-ring"></div>
            <div class="neon-ring"></div>
            <div class="loader-brand">
                <i class="fas fa-tv tv-icon"></i>
                <div class="brand-name">RS LIVE <span>TV</span></div>
            </div>
        </div>
        <div class="loading-text">BUFFERING...</div>
    </div>

    <!-- রিমোট ওপেন করার জন্য শুধুমাত্র আইকন (কোনো লেখা নেই) -->
    <div id="remote-toggle-icon" onclick="toggleRemote()">
        <i class="fas fa-tv"></i>
    </div>

    <!-- প্রফেশনাল রিমোট কন্ট্রোল প্যানেল বডি -->
    <div id="tv-remote-panel">
        <div class="remote-brand">RS SMART TV</div>
        <div class="remote-row">
            <button class="pwr-btn" onclick="location.reload()"><i class="fas fa-power-off"></i></button>
            <button class="cls-btn" onclick="toggleRemote()"><i class="fas fa-times"></i></button>
        </div>
        <div class="num-grid">
            <button class="r-btn" onclick="pressNum(1)">1</button><button class="r-btn" onclick="pressNum(2)">2</button><button class="r-btn" onclick="pressNum(3)">3</button>
            <button class="r-btn" onclick="pressNum(4)">4</button><button class="r-btn" onclick="pressNum(5)">5</button><button class="r-btn" onclick="pressNum(6)">6</button>
            <button class="r-btn" onclick="pressNum(7)">7</button><button class="r-btn" onclick="pressNum(8)">8</button><button class="r-btn" onclick="pressNum(9)">9</button>
            <div></div><button class="r-btn" onclick="pressNum(0)">0</button><div></div>
        </div>
        <div class="ch-container">
            <button class="ch-btn" onclick="changeChannel('up')"><i class="fas fa-chevron-up"></i> CH+</button>
            <button class="ok-btn">OK</button>
            <button class="ch-btn" onclick="changeChannel('down')">CH- <i class="fas fa-chevron-down"></i></button>
        </div>
    </div>

    <div id="player"></div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const streamSource = urlParams.get('url');

    if (streamSource) {
        const player = jwplayer("player").setup({
            playlist: [{ file: streamSource, type: "hls" }],
            width: "100%",
            height: "100%",
            autostart: true,
            stretching: "exactfit",
            skin: { name: "glow" },
            displaytitle: false
        });

        player.on("ready", () => {
            player.setMute(false);
            player.setVolume(100);
        });

        player.on("play", () => {
            document.getElementById("loader").classList.add("hide-now");
        });

        player.on("buffer", () => {
            document.getElementById("loader").classList.remove("hide-now");
        });

        player.on("error", () => {
            const loader = document.getElementById("loader");
            loader.classList.remove("hide-now"); 
            loader.innerHTML = `
                <div class="error-content">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p>Stream Offline!</p>
                    <div class="brand-name">RS LIVE <span>TV</span></div>
                </div>
            `;
        });

    } else {
        document.getElementById("loader").innerHTML = '<div class="brand-name">No Stream URL Found</div>';
    }

    // ================= রিমোট কন্ট্রোল স্ক্রিপ্ট লজিক =================
    
    function toggleRemote() {
        document.getElementById("tv-remote-panel").classList.toggle("open");
    }

    // নাম্বার বাটন এবং চ্যানেল পরিবর্তনের ডেমো ফাংশন
    function pressNum(num) {
        console.log("Pressed Number: " + num);
        // এখানে আপনার চ্যানেল পরিবর্তনের নিজস্ব রুলস বা উইন্ডো লিঙ্ক বসাতে পারেন।
    }

    function changeChannel(dir) {
        console.log("Channel changed to: " + dir);
    }

    // মোবাইল স্ক্রিন ফুলস্ক্রিন বা রোটেট (Landscape) মোড ডিটেকশন লজিক
    function checkOrientation() {
        const icon = document.getElementById("remote-toggle-icon");
        if (window.innerWidth < 1024) { // মোবাইল বা ট্যাব হলে
            if (window.innerHeight < window.innerWidth) {
                icon.classList.add("mobile-landscape-show"); // রোটেট করলে শো করবে
            } else {
                icon.classList.remove("mobile-landscape-show"); // নরমাল সোজা থাকলে হাইড
                document.getElementById("tv-remote-panel").classList.remove("open");
            }
        }
    }

    // স্ক্রিন ঘুরানো বা রিসাইজ ট্র্যাকিং করা
    window.addEventListener("resize", checkOrientation);
    window.addEventListener("orientationchange", checkOrientation);
    document.addEventListener("DOMContentLoaded", checkOrientation);
</script>

</body>
</html>
