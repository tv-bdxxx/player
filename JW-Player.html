<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Rs Live TV Player</title>
    <script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        #player { width: 100% !important; height: 100% !important; position: absolute; }
        
        /* চ্যানেল লিস্টের ডিজাইন */
        #channelList { 
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 10000; color: white; padding: 20px; overflow-y: auto; 
        }
        .channel-item { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; font-size: 18px; }
        .close-btn { background: #ff4444; border: none; color: white; padding: 10px 20px; margin-top: 20px; cursor: pointer; border-radius: 5px; }

        /* চ্যানেল বাটন */
        #channelBtn { 
            position: absolute; top: 15px; right: 60px; z-index: 9999; 
            background: rgba(0,0,0,0.5); color: white; padding: 8px 12px; 
            border-radius: 5px; cursor: pointer; font-size: 14px; border: 1px solid #555;
        }
    </style>
</head>
<body>

    <div id="channelList">
        <h2>চ্যানেল তালিকা</h2>
        <div class="channel-item" onclick="loadChannel('URL_1')">চ্যানেল ১</div>
        <div class="channel-item" onclick="loadChannel('URL_2')">চ্যানেল ২</div>
        <button class="close-btn" onclick="toggleChannels(false)">বন্ধ করুন</button>
    </div>

    <div id="channelBtn" onclick="toggleChannels(true)">📺 চ্যানেল</div>

    <div id="player"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const streamUrl = urlParams.get('url');

        const player = jwplayer("player").setup({
            file: streamUrl,
            width: "100%",
            height: "100%",
            autostart: true,
            stretching: "uniform" // ফুলস্ক্রিন মেসেজ কমাতে এটি সাহায্য করে
        });

        // চ্যানেল লিস্ট ওপেন/ক্লোজ ফাংশন
        function toggleChannels(show) {
            document.getElementById("channelList").style.display = show ? "block" : "none";
        }

        // চ্যানেল পরিবর্তন করার ফাংশন
        function loadChannel(url) {
            window.location.href = '?url=' + url;
        }
    </script>
</body>
</html>
