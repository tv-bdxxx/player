<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live TV Player</title>
    <link rel="stylesheet" href="bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }
        .video-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

<div class="video-container">
    <video id="video" controls autoplay playsinline webkit-playsinline></video>
</div>

<script>
    // URL থেকে স্ট্রিম লিঙ্ক (m3u8) নেওয়ার ফাংশন
    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    const streamUrl = getQueryParam('stream');
    const video = document.getElementById('video');

    if (streamUrl) {
        // যদি ব্রাউজার বা টিভি সরাসরি HLS (m3u8) সাপোর্ট করে (যেমন- Apple TV, Safari)
        if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = streamUrl;
            video.play().catch(error => console.log("Autoplay blocked:", error));
        } 
        // অন্যান্য মডার্ন টিভি ও অ্যান্ড্রয়েড ডিভাইসের জন্য (HLS.js)
        else if (Hls.isSupported()) {
            const hls = new Hls({
                maxBufferLength: 30, // স্মুথ প্লেব্যাকের জন্য বাফারিং অপ্টিমাইজেশন
                enableWorker: true,
                lowLatencyMode: true
            });
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play().catch(error => console.log("Autoplay blocked:", error));
            });
            
            // রিকানেকশন পলিসি (লিঙ্ক সাময়িক ড্রপ করলে অটো ঠিক হবে)
            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    switch (data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR:
                            hls.startLoad();
                            break;
                        case Hls.ErrorTypes.MEDIA_ERROR:
                            hls.recoverMediaError();
                            break;
                        default:
                            break;
                    }
                }
            });
        }
    } else {
        alert("No stream URL found!");
    }
</script>

</body>
</html>
