<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shak Player</title>
    
    <!-- JW Player Core Script -->
    <script src="https://jwpsrv.com/library/Ff6JgI9tEeS94CIACpW7BA.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        #shak-player {
            width: 100% !important;
            height: 100% !important;
        }
        /* প্লেয়ারের লোডিং টেক্সট বা ইরর মেসেজ স্টাইল */
        .error-msg {
            color: #ff4d4d;
            text-align: center;
            font-size: 18px;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div id="shak-player"></div>

    <script>
        // URL থেকে 'url' প্যারামিটারটি খুঁজে বের করার ফাংশন
        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // ইউজার যে ভিডিও লিংকটি পাস করবে সেটি ধরা
        const videoUrl = getQueryParam('url');

        if (videoUrl) {
            // JW Player সেটআপ
            jwplayer("shak-player").setup({
                file: videoUrl,
                width: "100%",
                height: "100%",
                aspectratio: "16:9",
                autostart: true,
                controls: true,
                stretching: "uniform",
                // প্লেয়ারের স্কিন কালার কাস্টমাইজেশন (Shak Player Theme)
                skin: {
                    name: "seven",
                    active: "#ff0000", // কন্ট্রোলবারের একটিভ কালার (লাল)
                    inactive: "#ffffff",
                    background: "rgba(0, 0, 0, 0.6)"
                }
            });
        } else {
            // যদি ইউআরএল-এ কোনো লিংক না থাকে
            document.getElementById('shak-player').innerHTML = `
                <div class="error-msg">
                    <h3>কোনো ভিডিও লিংক পাওয়া যায়নি!</h3>
                    <p>দয়া করে এভাবে লিংক ব্যবহার করুন: ?url=YOUR_VIDEO_URL</p>
                </div>
            `;
        }
    </script>

</body>
</html>
