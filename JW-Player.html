<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Rs Live TV Player</title>

    <script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>
    <script>
        jwplayer.key="Khpp2dHxlBJHC8MCmLnBuV2jK/DwDnJMniwF6EO9HC/riJ712ZmbHg==";
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #player {
            width: 100% !important;
            height: 100% !important;
            position: absolute;
            top: 0;
            left: 0;
        }
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
            transition: opacity 0.3s ease;
        }
        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: #3b82f6;
            animation: spin 0.8s linear infinite;
        }
        #loader-text {
            margin-top: 15px;
            color: #94a3b8;
            font-size: 13px;
            letter-spacing: 0.5px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div id="loader-text">Loading Stream...</div>
    </div>

    <div id="player"></div>

    <script>
        // URL থেকে প্যারামিটার নেওয়ার ক্লিন লজিক
        const urlParams = new URLSearchParams(window.location.search);
        const streamUrl = urlParams.get('url');

        if (!streamUrl) {
            document.getElementById("loader-text").innerHTML = "<span style='color:#ff4444;'>No Stream URL Found</span>";
        }

        // প্লেয়ার অপ্টিমাইজড কনফিগারেশন (বাফারিং কমানোর জন্য)
        const player = jwplayer("player").setup({
            file: streamUrl,
            width: "100%",
            height: "100%",
            aspectratio: "16:9",
            stretching: "fill",
            preload: "auto", // ব্যাকগ্রাউন্ডে স্ট্রিম প্রিলোড করবে
            autostart: true,
            mute: false,
            controls: true,
            playbackRateControls: false
        });

        // ফুলস্ক্রিন হ্যান্ডলার
        player.on("fullscreen", function(event){
            if(event.fullscreen && screen.orientation && screen.orientation.lock) {
                screen.orientation.lock("landscape").catch(function(err) {
                    console.log("Orientation lock ignored: ", err);
                });
            }
            setTimeout(() => {
                const videoEl = document.querySelector('.jw-video');
                if(videoEl) videoEl.style.setProperty('object-fit', 'fill', 'important');
            }, 100);
        });

        // প্লেয়ার ইভেন্ট কন্ট্রোল
        player.on("ready", fadeAndHideLoader);
        player.on("play", fadeAndHideLoader);

        player.on("error", function(){
            showLoader("<span style='color:#ff4444;'>Stream Failed or Invalid URL</span>");
        });

        player.on("buffer", function(){
            showLoader("Buffering...");
        });

        function showLoader(text) {
            const loader = document.getElementById("loader");
            loader.style.display = "flex";
            loader.style.opacity = "1";
            document.getElementById("loader-text").innerHTML = text;
        }

        function fadeAndHideLoader() {
            const loader = document.getElementById("loader");
            loader.style.opacity = "0";
            setTimeout(() => { 
                loader.style.display = "none"; 
            }, 300);
        }
    </script>
</body>
</html>
